version: 2
updates:
  # ── Node.js / npm dependencies ──────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Caracas"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    # Automatically rebase stale PRs
    rebase-strategy: "auto"
    ignore:
      # Only auto-update patch/minor; major versions reviewed manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ──────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci/cd"
    commit-message:
      prefix: "chore(actions)"
    ignore:
      # Pinned in workflow — only accept patch updates, review majors manually
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
