name: CI/CD — Build, Audit & Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Cambiado a main para evitar despliegues accidentales de ramas de desarrollo
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Security Audit
  # ─────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check for .env files
        run: |
          if git ls-files | grep -E '\.env$|\.env\.local$'; then
            echo "ERROR: environment file committed to repository"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Job 2: Build & Quality (Next.js)
  # ─────────────────────────────────────────────
  build:
    name: Build & Quality
    runs-on: ubuntu-latest
    needs: [security-audit] # Solo construye si la auditoría pasa
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build with Next.js
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  # ─────────────────────────────────────────────
  # Job 3: Deploy
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build] # Ahora sí coincide con el nombre del Job 2
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
